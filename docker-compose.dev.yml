services:
  postgres_dev:
    image: postgres:16-alpine
    container_name: finance_postgres_dev
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-financeapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-finance_db}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - finance_network_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financeapp} -d ${POSTGRES_DB:-finance_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_dev:
    image: redis:7-alpine
    container_name: finance_redis_dev
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - finance_network_dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend_dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance_backend_dev
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env.dev
    environment:
      - APP_ENV=development
      - POSTGRES_HOST=postgres_dev
      - REDIS_HOST=redis_dev
      - DATABASE_URL=postgresql+asyncpg://financeapp:changeme_secure_password@postgres_dev:5432/finance_db
      - REDIS_URL=redis://redis_dev:6379/0
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres_dev:
        condition: service_healthy
      redis_dev:
        condition: service_healthy
    networks:
      - finance_network_dev
    expose:
      - 8001

  frontend_dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: finance_frontend_dev
    ports:
      - "3001:3000"
    environment:
      - VITE_API_BASE_URL=/api/v1
      - VITE_PROXY_TARGET=http://backend_dev:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend_dev
    networks:
      - finance_network_dev

networks:
  finance_network_dev:
    driver: bridge

volumes:
  postgres_data_dev:
  redis_data_dev:
