services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - APP_ENV=development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    # In development, we might want to run the Vite dev server directly
    # This assumes the frontend Dockerfile can be overridden or we use a different approach
    # For now, let's just expose the port if it's being served by nginx in the container
    # Or override the command to run npm run dev if the Dockerfile supports it.
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
